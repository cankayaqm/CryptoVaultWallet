<!DOCTYPE html>
<html>
<head>
  <title>Transaction History</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .tx { border-bottom: 1px solid #ccc; padding: 10px 0; }
  </style>
</head>
<body>

<h2>Transaction History</h2>

<button onclick="loadHistory()">Load Transactions</button>

<div id="history"></div>

<script>
async function loadHistory() {
  const res = await fetch("http://localhost:3000/api/transactions/history");
  const data = await res.json();

  const container = document.getElementById("history");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "<p>No transactions yet</p>";
    return;
  }

  data.forEach(tx => {
    const div = document.createElement("div");
    div.className = "tx";

    div.innerHTML = `
      <strong>${tx.type.toUpperCase()}</strong><br>
      Amount: ${tx.amount}<br>
      To: ${tx.address}<br>
      Status: ${tx.status}<br>
      Time: ${tx.timestamp}<br>
      TxID: ${tx.id}
    `;

    container.appendChild(div);
  });
}
</script>

</body>
</html>
