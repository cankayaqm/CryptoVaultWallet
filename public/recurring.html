<!DOCTYPE html>
<html>
<head>
  <title>Recurring Payments</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select, button { margin: 10px 0; padding: 8px; width: 250px; }
    .payment { border-bottom: 1px solid #ccc; padding: 10px 0; }
  </style>
</head>
<body>

<h2>Recurring Payments</h2>

<input id="address" placeholder="Recipient Address" />
<br>

<input id="amount" type="number" placeholder="Amount" />
<br>

<select id="frequency">
  <option value="">Select Frequency</option>
  <option value="daily">Daily</option>
  <option value="weekly">Weekly</option>
  <option value="monthly">Monthly</option>
</select>
<br>

<button onclick="createRecurring()">Create Recurring Payment</button>

<p id="status"></p>

<hr>

<h3>Recurring Payment List</h3>

<button onclick="loadRecurring()">Load Recurring Payments</button>

<div id="list"></div>

<script>
async function createRecurring() {
  const address = document.getElementById("address").value;
  const amount = document.getElementById("amount").value;
  const frequency = document.getElementById("frequency").value;
  const status = document.getElementById("status");

  status.innerText = "Processing recurring payment...";

  try {
    const res = await fetch("/api/transactions/recurring", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ address, amount, frequency })
    });

    const data = await res.json();

    if (res.ok) {
      status.innerText = "Recurring payment created successfully";
      loadRecurring();
    } else {
      status.innerText = data.message;
    }

  } catch (err) {
    status.innerText = "Error connecting to server";
  }
}

async function loadRecurring() {
  const list = document.getElementById("list");

  try {
    const res = await fetch("/api/transactions/recurring");
    const data = await res.json();

    list.innerHTML = "";

    if (data.length === 0) {
      list.innerHTML = "<p>No recurring payments yet</p>";
      return;
    }

    data.forEach(payment => {
      const div = document.createElement("div");
      div.className = "payment";

      div.innerHTML = `
        <strong>${payment.type}</strong><br>
        Amount: ${payment.amount}<br>
        To: ${payment.address}<br>
        Frequency: ${payment.frequency}<br>
        Status: ${payment.status}<br>
        Next Execution: ${payment.nextExecution}<br>
        <button onclick="cancelRecurring('${payment.id}')">Cancel</button>
      `;

      list.appendChild(div);
    });

  } catch (err) {
    list.innerHTML = "<p>Error loading recurring payments</p>";
  }
}

async function cancelRecurring(id) {
  const status = document.getElementById("status");

  try {
    const res = await fetch("/api/transactions/recurring/" + id, {
      method: "DELETE"
    });

    const data = await res.json();

    if (res.ok) {
      status.innerText = "Recurring payment cancelled";
      loadRecurring();
    } else {
      status.innerText = data.message;
    }

  } catch (err) {
    status.innerText = "Error connecting to server";
  }
}
</script>

</body>
</html>
