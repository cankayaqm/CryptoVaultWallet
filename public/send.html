<!DOCTYPE html>
<html>
<head>
  <title>Send Crypto</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 10px 0; padding: 8px; width: 250px; }
  </style>
</head>
<body>

<h2>Send Crypto</h2>

<input id="address" placeholder="Recipient Address" />
<br>
<input id="amount" type="number" placeholder="Amount" />
<br>

<button onclick="sendCrypto()">Send</button>

<p id="status"></p>

<script>
async function sendCrypto() {
  const address = document.getElementById("address").value;
  const amount = document.getElementById("amount").value;
  const status = document.getElementById("status");

  status.innerText = "Processing transaction...";

  // fake delay to simulate network latency
  setTimeout(async () => {
    try {
      const res = await fetch("http://localhost:3000/api/transactions/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ address, amount })
      });

      const data = await res.json();

      if (res.ok) {
        status.innerText =
          `Success!\nTxID: ${data.txId}\nNew Balance: ${data.newBalance}`;
      } else {
        status.innerText = ` ${data.message}`;
      }

    } catch (err) {
      status.innerText = "Error connecting to server";
    }
  }, 1500);
}
</script>

</body>
</html>
